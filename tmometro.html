
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  #tmapp{font-family:var(--font-sans);background:#fff;color:#111;min-height:600px;max-width:480px;margin:0 auto;}
  #tmapp *{box-sizing:border-box;margin:0;padding:0;}
  #tmapp .page{display:none;flex-direction:column;align-items:center;padding:0 24px 56px;}
  #tmapp .page.active{display:flex;}

  #tmapp nav{display:flex;border-bottom:2px solid #ccc;background:#f5f5f5;position:sticky;top:0;z-index:100;width:100%;}
  #tmapp nav button{
    flex:1;
    padding:14px 4px;
    background:#f5f5f5;
    border:none;
    border-bottom:3px solid transparent;
    color:#111 !important;
    font-family:var(--font-sans);
    font-size:11px;
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    -webkit-text-fill-color:#111 !important;
  }
  #tmapp nav button.active{
    background:#fff;
    border-bottom:3px solid #cc2200;
    color:#cc2200 !important;
    -webkit-text-fill-color:#cc2200 !important;
  }

  #tmapp .big-title{font-family:'Bebas Neue',sans-serif;font-size:58px;color:#cc2200;letter-spacing:.05em;text-align:center;margin-top:28px;line-height:1;}
  #tmapp .gcount{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1;text-align:center;margin-top:6px;color:#111;transition:color .4s;}
  #tmapp .page-tm{justify-content:center;min-height:560px;gap:36px;}
  #tmapp #tmbtn{width:200px;height:200px;border-radius:50%;border:none;background:#cc2200;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:.08em;cursor:pointer;box-shadow:0 7px 0 #7a1400;transition:transform .08s,box-shadow .08s;user-select:none;-webkit-tap-highlight-color:transparent;}
  #tmapp #tmbtn:active{transform:translateY(5px);box-shadow:0 2px 0 #7a1400;}
  #tmapp .mysess{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#cc2200;text-align:center;line-height:1;}
  #tmapp .mysess-lbl{font-size:11px;color:#888;text-align:center;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
  #tmapp .pgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:100%;max-width:400px;margin-top:20px;}
  #tmapp .pcard{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:12px;padding:15px 10px;cursor:pointer;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:border-color .15s;}
  #tmapp .pcard.sel{border-color:#cc2200;background:#fff5f3;}
  #tmapp .pcard:active{transform:scale(.96);}
  #tmapp .pcard-name{font-weight:700;font-size:15px;color:#111;}
  #tmapp .pcard-c{font-size:11px;color:#888;margin-top:3px;}
  #tmapp .vbtn{width:100%;max-width:400px;padding:18px;background:#cc2200;border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.1em;cursor:pointer;margin-top:14px;-webkit-tap-highlight-color:transparent;transition:background .15s;}
  #tmapp .vbtn:disabled{background:#eee;color:#aaa;cursor:not-allowed;}
  #tmapp .vbtn:not(:disabled):active{background:#b01e00;transform:scale(.98);}
  #tmapp .plist{width:100%;max-width:430px;display:flex;flex-direction:column;gap:18px;margin-top:20px;}
  #tmapp .prow{display:flex;flex-direction:column;gap:5px;}
  #tmapp .prow-hdr{display:flex;justify-content:space-between;align-items:baseline;}
  #tmapp .prow-name{font-weight:700;font-size:14px;color:#111;}
  #tmapp .prow-n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#cc2200;}
  .tm-fly{position:fixed;font-size:30px;pointer-events:none;z-index:9999;animation:tmfly 1.3s ease-out forwards;}
  @keyframes tmfly{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-200px) scale(1.6);opacity:0;}}
  @keyframes flash{0%,100%{opacity:0;}50%{opacity:1;}}
  .fl{position:fixed;inset:0;background:rgba(200,34,0,.1);pointer-events:none;z-index:999;animation:flash .25s ease forwards;}
  .smoke-p{position:absolute;border-radius:50%;background:rgba(180,60,0,.1);animation:sp 2.5s ease-out forwards;pointer-events:none;}
  @keyframes sp{0%{transform:translateY(0) scale(.5);opacity:.5;}100%{transform:translateY(-80px) scale(3);opacity:0;}}
</style>

<div id="tmapp">
<nav id="tnav">
  <button class="active" id="nav-main" onclick="tp('main')">Tmometro</button>
  <button id="nav-tm" onclick="tp('tm')">TM</button>
  <button id="nav-vote" onclick="tp('vote')">Votar</button>
  <button id="nav-eas" onclick="tp('eas')">EAs</button>
</nav>

<!-- MAIN -->
<div class="page active" id="page-main">
  <div class="big-title">TMOMETRO</div>
  <div class="gcount" id="gcount">0</div>
  <div style="position:relative;margin-top:16px;">
    <svg width="140" height="340" viewBox="0 0 140 340">
      <defs>
        <clipPath id="tc">
          <rect x="48" y="18" width="44" height="222" rx="22"/>
          <circle cx="70" cy="280" r="34"/>
        </clipPath>
      </defs>
      <rect x="44" y="14" width="52" height="230" rx="26" fill="#b8d8dc"/>
      <circle cx="70" cy="280" r="46" fill="#b8d8dc"/>
      <rect x="52" y="22" width="36" height="214" rx="18" fill="#ddeaec"/>
      <circle cx="70" cy="280" r="34" fill="#ddeaec"/>
      <rect id="mfill" x="52" y="236" width="36" height="0" fill="#cc2200" clip-path="url(#tc)" style="transition:y .9s cubic-bezier(.34,1.1,.64,1),height .9s cubic-bezier(.34,1.1,.64,1);"/>
      <circle id="bfill" cx="70" cy="280" r="30" fill="#cc2200"/>
      <rect x="38" y="70"  width="18" height="10" rx="5" fill="#555"/>
      <rect x="38" y="110" width="18" height="10" rx="5" fill="#555"/>
      <rect x="38" y="150" width="18" height="10" rx="5" fill="#555"/>
      <rect x="38" y="190" width="18" height="10" rx="5" fill="#555"/>
      <rect x="58" y="28" width="10" height="200" rx="5" fill="rgba(255,255,255,0.2)"/>
      <ellipse cx="60" cy="268" rx="10" ry="7" fill="rgba(255,255,255,0.25)"/>
    </svg>
    <div id="smoke-anchor" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:100px;height:80px;overflow:hidden;pointer-events:none;"></div>
  </div>
</div>

<!-- TM -->
<div class="page page-tm" id="page-tm">
  <div>
    <div class="mysess" id="mynum">0</div>
    <div class="mysess-lbl">mis TMs esta sesión</div>
  </div>
  <button id="tmbtn" onclick="hitTM(event)">TM</button>
</div>

<!-- VOTAR -->
<div class="page" id="page-vote">
  <div style="margin-top:24px;font-size:13px;color:#111;text-align:center;font-weight:600;">Elige a quién sumarle un TM</div>
  <div class="pgrid" id="pgrid"></div>
  <button class="vbtn" id="vbtn" onclick="doVote()" disabled>VOTAR</button>
</div>

<!-- EAs -->
<div class="page" id="page-eas">
  <div class="plist" id="plist"></div>
</div>
</div>

<script>
const PEOPLE=['Julio','Ga','Abel','Jaime','Bárbara','Jessica','Antonio'];
const MG=10000,MP=2000;
let S={g:0,p:{},my:0};
PEOPLE.forEach(n=>S.p[n]=0);

function load(){
  try{const d=localStorage.getItem('tmo10');if(d){const r=JSON.parse(d);S.g=r.g||0;S.p=r.p||{};S.my=r.my||0;PEOPLE.forEach(n=>{if(!S.p[n])S.p[n]=0;});}}catch(e){}
}
function save(){try{localStorage.setItem('tmo10',JSON.stringify(S));}catch(e){}}

function tp(n){
  document.querySelectorAll('#tmapp .page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('#tnav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('nav-'+n).classList.add('active');
  if(n==='vote')renderGrid();
  if(n==='eas')renderEAs();
}

function updateThermo(){
  const pct=Math.min(S.g/MG,1);
  const tubeH=214,topY=22;
  const fillH=Math.round(pct*tubeH);
  const mf=document.getElementById('mfill');
  if(mf){mf.setAttribute('y',topY+tubeH-fillH);mf.setAttribute('height',fillH);}
  const gc=document.getElementById('gcount');
  if(gc){gc.textContent=S.g.toLocaleString();const g=Math.max(0,Math.round(255*(1-pct)));gc.style.color=pct>.03?`rgb(${Math.round(160+pct*95)},${g},0)`:'#111';}
  const bf=document.getElementById('bfill');
  if(bf){const g2=Math.max(0,Math.round(50-pct*50));bf.setAttribute('fill',`rgb(${Math.round(200+pct*55)},${g2},0)`);}
  if(pct>.2)spawnSmoke(pct);
}

let smokeT=null;
function spawnSmoke(pct){
  if(smokeT)return;
  smokeT=setTimeout(()=>smokeT=null,Math.max(300,2000-pct*1800));
  const w=document.getElementById('smoke-anchor');if(!w)return;
  for(let i=0;i<Math.ceil(pct*3);i++){
    const d=document.createElement('div');d.className='smoke-p';
    const sz=12+Math.random()*16;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${20+Math.random()*60}%;bottom:0;animation-delay:${i*.3}s`;
    w.appendChild(d);setTimeout(()=>d.remove(),3000);
  }
}

function spawnTM(e){
  const el=document.createElement('div');el.className='tm-fly';el.textContent='™️';
  let x,y;
  if(e&&e.clientX){x=e.clientX-15;y=e.clientY-15;}
  else{const b=document.getElementById('tmbtn').getBoundingClientRect();x=b.left+b.width/2-15;y=b.top+b.height/2-15;}
  el.style.cssText=`left:${x}px;top:${y}px;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
}

function flash(){
  const el=document.createElement('div');el.className='fl';
  document.body.appendChild(el);setTimeout(()=>el.remove(),280);
}

function hitTM(e){
  if(S.g>=MG)return;
  S.g=Math.min(S.g+1,MG);S.my++;save();
  updateThermo();spawnTM(e);flash();
  const mn=document.getElementById('mynum');if(mn)mn.textContent=S.my;
}

let selP=null;
function renderGrid(){
  selP=null;
  const c=document.getElementById('pgrid');if(!c)return;c.innerHTML='';
  PEOPLE.forEach(name=>{
    const d=document.createElement('div');d.className='pcard';
    d.innerHTML=`<div class="pcard-name">${name}</div><div class="pcard-c">${S.p[name]} TMs</div>`;
    d.onclick=()=>{selP=name;document.querySelectorAll('.pcard').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');document.getElementById('vbtn').disabled=false;};
    c.appendChild(d);
  });
  document.getElementById('vbtn').disabled=true;
  document.getElementById('vbtn').textContent='VOTAR';
}

function doVote(){
  if(!selP)return;
  S.p[selP]++;S.g=Math.min(S.g+1,MG);save();
  updateThermo();flash();spawnTM(null);
  document.getElementById('vbtn').textContent='✓';
  document.querySelectorAll('.pcard').forEach(x=>{
    const n=x.querySelector('.pcard-name').textContent;
    x.querySelector('.pcard-c').textContent=S.p[n]+' TMs';
  });
  setTimeout(()=>{document.getElementById('vbtn').textContent='VOTAR';document.getElementById('vbtn').disabled=false;},350);
}

function thermoH(pct,W){
  const H=56,bOuter=H/2,bInner=bOuter*0.74,cy=H/2,cx=bOuter;
  const tubeW=W-cx-6;
  const tubeOuterH=bOuter*0.78,tubeInnerH=bInner*0.85;
  const tubeOuterY=cy-tubeOuterH/2,tubeInnerY=cy-tubeInnerH/2;
  const fillW=Math.max(0,Math.round(pct*tubeW));
  const uid='hc'+(Math.random()*1e9|0);
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="${uid}">
      <circle cx="${cx}" cy="${cy}" r="${bInner}"/>
      <rect x="${cx}" y="${tubeInnerY}" width="${tubeW}" height="${tubeInnerH}" rx="${tubeInnerH/2}"/>
    </clipPath></defs>
    <rect x="${cx}" y="${tubeOuterY}" width="${tubeW}" height="${tubeOuterH}" rx="${tubeOuterH/2}" fill="#b8d8dc"/>
    <circle cx="${cx}" cy="${cy}" r="${bOuter}" fill="#b8d8dc"/>
    <rect x="${cx}" y="${tubeInnerY}" width="${tubeW}" height="${tubeInnerH}" rx="${tubeInnerH/2}" fill="#ddeaec"/>
    <circle cx="${cx}" cy="${cy}" r="${bInner}" fill="#ddeaec"/>
    <g clip-path="url(#${uid})">
      <circle cx="${cx}" cy="${cy}" r="${bInner}" fill="#cc2200"/>
      <rect x="${cx}" y="${tubeInnerY}" width="${fillW}" height="${tubeInnerH}" fill="#cc2200"/>
    </g>
    <rect x="${cx+tubeW*.25-2}" y="${tubeOuterY-5}" width="4" height="7" rx="2" fill="#555"/>
    <rect x="${cx+tubeW*.50-2}" y="${tubeOuterY-5}" width="4" height="7" rx="2" fill="#555"/>
    <rect x="${cx+tubeW*.75-2}" y="${tubeOuterY-5}" width="4" height="7" rx="2" fill="#555"/>
    <ellipse cx="${cx-bInner*.3}" cy="${cy-bInner*.35}" rx="${bInner*.3}" ry="${bInner*.22}" fill="rgba(255,255,255,0.28)"/>
    <rect x="${cx+8}" y="${tubeInnerY+2}" width="${tubeW*.5}" height="${tubeInnerH*.28}" rx="${tubeInnerH*.14}" fill="rgba(255,255,255,0.2)"/>
  </svg>`;
}

function renderEAs(){
  const list=document.getElementById('plist');if(!list)return;
  const sorted=[...PEOPLE].sort((a,b)=>S.p[b]-S.p[a]);
  list.innerHTML='';
  const W=Math.min(list.offsetWidth||390,430);
  sorted.forEach((name,i)=>{
    const count=S.p[name];
    const pct=Math.min(count/MP,1);
    const row=document.createElement('div');row.className='prow';
    row.innerHTML=`
      <div class="prow-hdr">
        <span class="prow-name">${i===0&&count>0?'▲ ':''}${name}</span>
        <span class="prow-n">${count}</span>
      </div>
      ${thermoH(pct,W)}`;
    list.appendChild(row);
  });
}

load();updateThermo();
document.getElementById('mynum').textContent=S.my;
</script>
